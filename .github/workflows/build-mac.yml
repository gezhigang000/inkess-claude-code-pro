name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to build
        required: true
        type: string
      release_channel:
        description: prod or test
        required: true
        default: test
        type: choice
        options: [prod, test]
      oss_prefix:
        description: OSS directory prefix
        required: true
        default: pro-releases-test
        type: string
      upload_latest:
        description: Update latest/ copy in OSS
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14   # Apple Silicon runner; has Xcode + notarytool preinstalled
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Override version for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          python3 - <<'PY'
          import json, os
          path = 'package.json'
          with open(path, 'r', encoding='utf-8') as f:
              pkg = json.load(f)
          pkg['version'] = os.environ['RELEASE_VERSION']
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(pkg, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY

      - name: Resolve effective version
        id: version
        shell: bash
        run: |
          # After any overrides, read the canonical version from package.json.
          # Works both for push:tags (package.json already has the right version)
          # and workflow_dispatch (override step just wrote it).
          V=$(jq -r .version package.json)
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "Effective version: $V"

      # ---------------------------------------------------------------
      # Import Developer ID Application cert into a fresh temporary
      # keychain. We do NOT touch the default login keychain so repeated
      # runs stay isolated. electron-builder's internal signing step will
      # discover the identity by name via CSC_NAME.
      # ---------------------------------------------------------------
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          KC_PATH="$RUNNER_TEMP/inkess-build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          # Decode base64 cert into a file
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create a fresh keychain just for this run
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"

          # Import cert + key (-A = allow any app to use; fine on a
          # throwaway CI runner)
          security import "$CERT_PATH" \
            -k "$KC_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12

          # Prepend our keychain to the search list so codesign finds it
          security list-keychain -d user -s "$KC_PATH" $(security list-keychains -d user | sed s/\"//g)

          # Verify the Developer ID Application identity is available
          security find-identity -v -p codesigning "$KC_PATH"

          # Remove the .p12 file from disk (still in keychain)
          rm -f "$CERT_PATH"

      # ---------------------------------------------------------------
      # Build + sign + notarize via electron-builder. The notarize config
      # in package.json has notarize: true, so electron-builder will call
      # @electron/notarize automatically after signing. Notarization is
      # authenticated via the App-Specific Password (APPLE_PASSWORD).
      # ---------------------------------------------------------------
      - name: Build & Package (sign + notarize)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # electron-builder rejects CSC_NAME with a "Developer ID Application: "
          # prefix — it wants the common name only (e.g. "grant ge (3X5DVPNRS7)").
          # We strip the prefix here rather than storing a stripped version in
          # the secret, so APPLE_SIGNING_IDENTITY matches what `security
          # find-identity` prints exactly.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CSC_KEYCHAIN: ${{ runner.temp }}/inkess-build.keychain-db
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
        run: |
          export CSC_NAME="${APPLE_SIGNING_IDENTITY#Developer ID Application: }"
          echo "Using CSC_NAME=$CSC_NAME"
          # Must pass --publish=always so electron-builder generates
          # release/latest-mac.yml for electron-updater. Gotchas:
          #   --publish=never : SKIPS the auto-update manifest entirely
          #                     (we hit this in run #3)
          #   (no flag)       : In CI, electron-builder enters "implicit
          #                     publishing" which also skips the manifest
          #                     for generic providers (hit this in run #2)
          #   --publish=always: Generates the manifest AND attempts to push.
          #                     For a generic provider this is a no-op push,
          #                     so the manifest lands in release/ and the
          #                     build exits clean.
          npm run build
          npx electron-builder --mac --arm64 --publish=always

      # ---------------------------------------------------------------
      # Cleanup: delete the temp keychain so the next job on the same
      # runner (if self-hosted) doesn't inherit stale creds. On
      # macos-latest this is cosmetic (runner is thrown away).
      # ---------------------------------------------------------------
      - name: Cleanup keychain
        if: always()
        run: |
          KC_PATH="$RUNNER_TEMP/inkess-build.keychain-db"
          security delete-keychain "$KC_PATH" 2>/dev/null || true

      # ---------------------------------------------------------------
      # electron-builder silently does NOT write release/latest-mac.yml
      # on the macos-14 runner under any --publish mode (we tried never,
      # always, and implicit — all produced 4 artifacts, no manifest).
      # Without latest-mac.yml, electron-updater on installed clients
      # cannot discover new versions — auto-update would be dead.
      #
      # Generate the manifest ourselves from the dmg + zip that
      # electron-builder already produced. The schema is stable and
      # well-understood (electron-updater parses it line-by-line).
      # ---------------------------------------------------------------
      - name: Generate latest-mac.yml
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          python3 - <<'PY'
          import hashlib, base64, os, glob
          from datetime import datetime, timezone

          version = os.environ['RELEASE_VERSION']

          def sha512_b64(path):
              h = hashlib.sha512()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return base64.b64encode(h.digest()).decode()

          zip_files = sorted(glob.glob('release/*-arm64-mac.zip'))
          dmg_files = sorted(glob.glob('release/*-arm64.dmg'))
          if not zip_files or not dmg_files:
              raise SystemExit(f'missing zip/dmg: zip={zip_files} dmg={dmg_files}')

          zip_path, dmg_path = zip_files[0], dmg_files[0]
          zip_name, dmg_name = os.path.basename(zip_path), os.path.basename(dmg_path)
          zip_sha, dmg_sha = sha512_b64(zip_path), sha512_b64(dmg_path)
          zip_size, dmg_size = os.path.getsize(zip_path), os.path.getsize(dmg_path)
          release_date = datetime.now(timezone.utc).isoformat(timespec='milliseconds').replace('+00:00', 'Z')

          # electron-updater on Mac prefers the zip for auto-update (faster,
          # no mount). `path` + top-level `sha512` point to the zip. The DMG
          # is still listed in `files` so users downloading via website /
          # homebrew get the DMG.
          yml = (
              f"version: {version}\n"
              f"files:\n"
              f"  - url: {zip_name}\n"
              f"    sha512: {zip_sha}\n"
              f"    size: {zip_size}\n"
              f"  - url: {dmg_name}\n"
              f"    sha512: {dmg_sha}\n"
              f"    size: {dmg_size}\n"
              f"path: {zip_name}\n"
              f"sha512: {zip_sha}\n"
              f"releaseDate: '{release_date}'\n"
          )

          with open('release/latest-mac.yml', 'w') as f:
              f.write(yml)

          print('Wrote release/latest-mac.yml:')
          print(yml)
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*-mac.zip
            release/*-mac.zip.blockmap
            release/latest-mac.yml
          retention-days: 30

      - name: Upload to OSS
        if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          # Tag-push → prod defaults. workflow_dispatch → caller-provided inputs.
          OSS_PREFIX: ${{ github.event_name == 'workflow_dispatch' && inputs.oss_prefix || 'pro-releases' }}
          UPLOAD_LATEST: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_latest || 'true' }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          # macos-14 runner has a PEP 668 externally-managed Python from
          # Homebrew, so plain `pip3 install` errors out. --break-system-packages
          # is safe on a throwaway CI runner.
          pip3 install --break-system-packages oss2
          python3 - <<'PY'
          import glob, os, oss2
          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-ap-northeast-1.aliyuncs.com', 'inkess-app')
          prefix = os.environ['OSS_PREFIX']
          version = os.environ['RELEASE_VERSION']
          upload_latest = os.environ['UPLOAD_LATEST'].lower() == 'true'

          uploaded_dmg = None
          patterns = ['release/*.dmg', 'release/*.dmg.blockmap',
                      'release/*-mac.zip', 'release/*-mac.zip.blockmap',
                      'release/latest-mac.yml']
          for pat in patterns:
              for f in glob.glob(pat):
                  name = os.path.basename(f)
                  key = f'{prefix}/{name}'
                  size_mb = os.path.getsize(f) / 1024 / 1024
                  print(f'  {name} ({size_mb:.1f} MB)...')
                  oss2.resumable_upload(bucket, key, f, part_size=10*1024*1024, num_threads=2)
                  if name.endswith('-arm64.dmg'):
                      uploaded_dmg = name

          if upload_latest and uploaded_dmg:
              src = f'{prefix}/{uploaded_dmg}'
              for dst in [f'{prefix}/latest/macos-arm64-v{version}.dmg', f'{prefix}/latest/macos-arm64.dmg']:
                  bucket.copy_object(bucket.bucket_name, src, dst)
                  print(f'  latest/ <- {os.path.basename(dst)}')
          PY
