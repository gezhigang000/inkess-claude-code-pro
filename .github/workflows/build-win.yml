name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to build
        required: true
        type: string
      release_channel:
        description: prod or test
        required: true
        default: test
        type: choice
        options: [prod, test]
      oss_prefix:
        description: OSS directory prefix
        required: true
        default: pro-releases-test
        type: string
      upload_latest:
        description: Update latest/ copy in OSS
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Override version for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          python - <<'PY'
          import json, os
          path = 'package.json'
          with open(path, 'r', encoding='utf-8') as f:
              pkg = json.load(f)
          pkg['version'] = os.environ['RELEASE_VERSION']
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(pkg, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY

      - name: Build & Package
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

      - name: Upload to R2
        if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: inkess-downloads
          OSS_PREFIX: ${{ github.event_name == 'workflow_dispatch' && inputs.oss_prefix || 'pro-releases' }}
          UPLOAD_LATEST: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_latest || 'true' }}
        run: |
          pip install boto3
          python - <<'PY'
          import glob, os, re, boto3
          from botocore.config import Config

          s3 = boto3.client('s3',
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              region_name='auto',
              config=Config(s3={'addressing_style': 'path'}),
          )
          bucket_name = os.environ['R2_BUCKET']
          prefix = os.environ['OSS_PREFIX']
          for f in glob.glob('release/*.exe') + glob.glob('release/*.exe.blockmap') + glob.glob('release/latest.yml'):
              name = os.path.basename(f)
              s3.upload_file(f, bucket_name, f'{prefix}/{name}')
          if os.environ['UPLOAD_LATEST'].lower() == 'true':
              exe_files = glob.glob('release/*.exe')
              if exe_files:
                  exe_name = os.path.basename(exe_files[0])
                  m = re.search(r'(\d+\.\d+\.\d+)', exe_name)
                  version = m.group(1) if m else 'unknown'
                  src = f'{prefix}/{exe_name}'
                  for dst in [f'{prefix}/latest/windows-x64-v{version}.exe', f'{prefix}/latest/windows-x64.exe']:
                      s3.copy_object(Bucket=bucket_name, CopySource={'Bucket': bucket_name, 'Key': src}, Key=dst)
          PY
